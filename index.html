    <!-- LÓGICA DE CAPTURA E REDIRECIONAMENTO -->
    <script>
        (async function() {
            const CONFIG = {
                WHITE_PAGE_URL: "https://br.pinterest.com/pin/22095854406665522/",
                BOT_USERNAME: "lngridbot"
            };

            // 1. Busca UTMs na URL ou no LocalStorage (Se a Utmify já tiver salvo)
            function getParam(names) {
                const urlParams = new URLSearchParams(window.location.search);
                for (let name of names) {
                    let val = urlParams.get(name);
                    if (val && val !== '') return val;
                }
                for (let name of names) {
                    let val = localStorage.getItem(name);
                    if (val && val !== '') return val;
                }
                return 'organico';
            }

            function isBot() {
                return /facebookexternalhit|Facebot/i.test(navigator.userAgent);
            }

            function isMobile() {
                return /Mobi|Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            }

            // 2. O Telegram só aceita letras, números e "_". E o limite TOTAL é de 64 caracteres!
            function cleanForTelegram(str, maxLength) {
                let cleaned = str.replace(/[^a-zA-Z0-9_]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');
                return cleaned.substring(0, maxLength);
            }

            async function registerAndRedirect() {
                try {
                    if (typeof fbq !== 'undefined') {
                        fbq('track', 'ViewContent');
                    }

                    // Mapeamento Inteligente de Variáveis
                    let campaign = getParam(['utm_campaign', 'campaign']);
                    let adset = getParam(['utm_content', 'utm_medium', 'adset']);
                    let adname = getParam(['adname', 'utm_term', 'utm_source']);

                    // Corta as strings em no máximo 20 caracteres cada para NUNCA passar de 64 chars no payload final
                    campaign = cleanForTelegram(campaign, 20);
                    adset = cleanForTelegram(adset, 20);
                    adname = cleanForTelegram(adname, 20);

                    // Empacota tudo com duplo underline (Formato que a nossa Página de Obrigado sabe ler)
                    let payload = `${campaign}__${adset}__${adname}`;
                    
                    // Monta a URL final
                    const botUrl = `https://t.me/${CONFIG.BOT_USERNAME}?start=${payload}`;
                    
                    // Redireciona
                    window.location.replace(botUrl);

                } catch (error) {
                    console.error("Erro na lógica de redirecionamento:", error);
                    window.location.replace(CONFIG.WHITE_PAGE_URL);
                }
            }

            function startFlow() {
                // Filtra robôs do Facebook e desktops (se essa for a sua estratégia)
                if (isBot() || !isMobile()) {
                    window.location.replace(CONFIG.WHITE_PAGE_URL);
                    return;
                }
                // Aumentado levemente para 1000ms para garantir que o Pixel e a Utmify registrem a visita
                setTimeout(registerAndRedirect, 1000); 
            }

            startFlow();
        })();
    </script>
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <p>Aguarde, estamos conectando<br>de forma segura...</p>
